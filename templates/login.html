<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Portal UNACH</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body class="bg-gradient-unach">
    <div class="container min-vh-100 d-flex justify-content-center align-items-center">
        <div class="col-md-6 col-lg-4">
            <div class="card login-card shadow-lg border-0 rounded-4">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <h2 class="fw-bold text-unach">Portal UNACH</h2>
                        <p class="text-muted">Conectividad Universitaria</p>
                    </div>

                    {% with messages = get_flashed_messages(with_categories=true) %}
                        {% if messages %}
                            {% for category, message in messages %}
                                <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                                    {{ message }}
                                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                                </div>
                            {% endfor %}
                        {% endif %}
                    {% endwith %}
                    {% if require_password %}
                    <form action="{{ url_for('login') }}" method="POST">
                        <input type="hidden" name="email" value="{{ email }}">
                        <div class="mb-4 text-center">
                            <i class="bi bi-person-circle fs-1 text-muted d-block mb-2"></i>
                            <span class="badge bg-light text-dark fs-6">{{ email }}</span>
                        </div>
                        <div class="mb-4">
                            <label for="password" class="form-label mt-2">Contraseña de Administrador</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0">
                                    <i class="bi bi-lock-fill"></i>
                                </span>
                                <input type="password" class="form-control border-start-0 bg-light" id="password" name="password" placeholder="***" required autofocus>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-unach w-100 py-2 rounded-3 fw-semibold mb-3">
                            Verificar y Entrar <i class="bi bi-shield-lock ms-2"></i>
                        </button>
                        <div class="text-center">
                            <a href="{{ url_for('login') }}" class="text-decoration-none text-muted small"><i class="bi bi-arrow-left me-1"></i> Usar otra cuenta</a>
                        </div>
                    </form>
                    {% else %}
                    <form action="{{ url_for('login') }}" method="POST">
                        <div class="mb-4">
                            <label for="email" class="form-label">Correo Institucional (Google Workspace)</label>
                            <div class="input-group mb-3">
                                <span class="input-group-text bg-light border-end-0">
                                    <i class="bi bi-google"></i>
                                </span>
                                <input type="email" class="form-control border-start-0 bg-light" id="email" name="email" placeholder="usuario@...unach.cl" required autocomplete="email" autofocus>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-unach w-100 py-2 rounded-3 fw-semibold">
                            Siguiente <i class="bi bi-arrow-right-circle ms-2"></i>
                        </button>
                    </form>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
